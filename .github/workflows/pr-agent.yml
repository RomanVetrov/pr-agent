name: PR Agent with DeepSeek

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  run-pr-agent:
    runs-on: ubuntu-latest

    env:
      DEEPSEEK__API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      GITHUB__USER_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Debug ENV values
        run: |
          echo "🔐 GITHUB__USER_TOKEN: $GITHUB__USER_TOKEN"
          echo "🤖 DEEPSEEK__API_KEY: $DEEPSEEK__API_KEY"

      - name: Run PR Agent
        run: |
          export GITHUB__USER_TOKEN="${GITHUB__USER_TOKEN}"
          export DEEPSEEK__API_KEY="${DEEPSEEK__API_KEY}"
          export LITELLM_MODEL="deepseek-chat"
          python -m pr_agent.cli --pr_url="${{ github.event.pull_request.html_url }}" review

